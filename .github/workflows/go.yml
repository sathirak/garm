name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        go: ["1.23.x"]
        include:
        - go: 1.23.x

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.23.x
        cache-dependency-path: '**/go.sum'

    - name: Download Dependencies
      run: |
        go mod download

    - name: Test
      run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4
      name: Check out repository
    - uses: actions/setup-go@v5
      name: Set up Go
      with:
        go-version: 1.23.x
        cache: true  # managed by golangci-lint

    - uses: golangci/golangci-lint-action@v6
      name: Install golangci-lint
      with:
        version: latest
        # Hack: Use the official action to download, but not run.
        # make lint below will handle actually running the linter.
        args: --help

    - run: make lint-ci
      name: Lint

    - uses: golang/govulncheck-action@v1
      name: vulncheck
      with:
          go-version-input: 1.23.x
          go-package: ./...
